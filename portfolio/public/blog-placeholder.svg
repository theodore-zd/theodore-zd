<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-label="Blog post thumbnail placeholder">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0b1020"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1f2937" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <rect width="1600" height="900" fill="url(#grid)" opacity="0.6"/>

  <g opacity="0.18">
    <circle cx="1350" cy="180" r="220" fill="url(#accent)"/>
    <circle cx="260" cy="760" r="260" fill="url(#accent)"/>
  </g>

  <g transform="translate(120 360)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
    <text x="0" y="0" font-size="44" fill="#22d3ee" opacity="0.9">$</text>
    <text x="60" y="0" font-size="44" fill="#e5e7eb">cat post.md</text>
    <text x="0" y="70" font-size="28" fill="#94a3b8" opacity="0.85"># placeholder thumbnail</text>
    <text x="0" y="120" font-size="28" fill="#94a3b8" opacity="0.7">// swap via `thumbnail:` in frontmatter</text>
  </g>

  <rect x="120" y="560" width="360" height="4" rx="2" fill="url(#accent)"/>
</svg>
